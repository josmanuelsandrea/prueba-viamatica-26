<app-navbar />
<p-toast />
<p-confirmDialog />

<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="m-0">Gestión de Usuarios</h2>
    <div class="flex gap-2">
      <label class="p-button p-button-outlined p-button-secondary" style="cursor:pointer">
        <i class="pi pi-upload mr-1"></i> Carga masiva
        <input type="file" accept=".xlsx,.csv" hidden (change)="onFileUpload($event)" />
      </label>
      <p-button label="Nuevo usuario" icon="pi pi-plus" (onClick)="openCreate()" />
    </div>
  </div>

  <p-table
    [value]="users()"
    [loading]="loading()"
    [paginator]="true"
    [rows]="10"
    [rowsPerPageOptions]="[10, 25, 50]"
    styleClass="p-datatable-sm p-datatable-striped"
    [globalFilterFields]="['username', 'email', 'rolName', 'statusDescription']"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Usuario</th>
        <th>Correo</th>
        <th>Rol</th>
        <th>Estado</th>
        <th>Creado</th>
        <th>Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.username }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.rolName }}</td>
        <td>
          <p-tag [value]="user.statusDescription" [severity]="getStatusSeverity(user.statusId)" />
        </td>
        <td>{{ user.createdAt | date:'dd/MM/yyyy' }}</td>
        <td>
          <div class="flex gap-1">
            <p-button icon="pi pi-pencil" [text]="true" severity="secondary" (onClick)="openEdit(user)" pTooltip="Editar" />
            @if (user.statusId === 'PEN') {
              <p-button icon="pi pi-check" [text]="true" severity="success" (onClick)="approve(user)" pTooltip="Aprobar" />
            }
            @if (user.statusId === 'ACT') {
              <p-button icon="pi pi-ban" [text]="true" severity="warn" (onClick)="toggleStatus(user)" pTooltip="Desactivar" />
            }
            @if (user.statusId === 'INA') {
              <p-button icon="pi pi-check-circle" [text]="true" severity="success" (onClick)="toggleStatus(user)" pTooltip="Activar" />
            }
            <p-button icon="pi pi-trash" [text]="true" severity="danger" (onClick)="deleteUser(user)" pTooltip="Eliminar" />
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="text-center py-4">No hay usuarios registrados.</td></tr>
    </ng-template>
  </p-table>
</div>

<app-user-form
  [visible]="showDialog()"
  [user]="selectedUser()"
  [mode]="dialogMode()"
  (saved)="onSaved()"
  (cancelled)="showDialog.set(false)"
/>
