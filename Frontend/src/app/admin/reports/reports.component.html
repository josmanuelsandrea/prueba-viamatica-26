<div class="p-4">
  <div class="flex align-items-center justify-content-between mb-4">
    <h2 class="m-0">Reporte de Clientes con Contratos Vigentes</h2>
    <div class="flex gap-2">
      <p-button
        label="Generar Reporte"
        icon="pi pi-file"
        (onClick)="loadReport()"
        [loading]="loading()">
      </p-button>
      <p-button
        label="Imprimir / Guardar PDF"
        icon="pi pi-print"
        severity="secondary"
        (onClick)="print()"
        [disabled]="!html()">
      </p-button>
    </div>
  </div>

  <div *ngIf="!html() && !loading()" class="text-center text-color-secondary p-6">
    <i class="pi pi-file text-5xl mb-3 block"></i>
    <p>Haz clic en "Generar Reporte" para visualizar el reporte.</p>
  </div>

  <div *ngIf="html()" [innerHTML]="html()"></div>
</div>
