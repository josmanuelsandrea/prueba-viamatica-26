<p-dialog
  [visible]="visible"
  [header]="mode === 'create' ? 'Nuevo usuario' : 'Editar usuario'"
  [modal]="true"
  [style]="{ width: '420px' }"
  (onHide)="cancel()"
>
  <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3 pt-2">
    <div class="flex flex-column gap-1">
      <label class="font-medium">Usuario <span class="text-red-500">*</span></label>
      <input pInputText formControlName="username" placeholder="8-20 caracteres alfanuméricos" class="w-full" />
      @if (form.controls.username.invalid && form.controls.username.touched) {
        <small class="text-red-500">8-20 caracteres, letras y al menos un número, sin especiales.</small>
      }
    </div>

    @if (mode === 'create') {
      <div class="flex flex-column gap-1">
        <label class="font-medium">Contraseña <span class="text-red-500">*</span></label>
        <input pInputText type="password" formControlName="password" placeholder="8-30 chars, mayúscula y número" class="w-full" />
        @if (form.controls.password.invalid && form.controls.password.touched) {
          <small class="text-red-500">8-30 caracteres, al menos una mayúscula y un número.</small>
        }
      </div>
    }

    <div class="flex flex-column gap-1">
      <label class="font-medium">Correo <span class="text-red-500">*</span></label>
      <input pInputText type="email" formControlName="email" placeholder="correo@ejemplo.com" class="w-full" />
    </div>

    <div class="flex flex-column gap-1">
      <label class="font-medium">Rol <span class="text-red-500">*</span></label>
      <p-select
        formControlName="rolId"
        [options]="roles()"
        optionLabel="name"
        optionValue="id"
        placeholder="Seleccione un rol"
        styleClass="w-full"
        appendTo="body"
      />
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="cancel()" />
    <p-button label="Guardar" icon="pi pi-save" [loading]="loading()" [disabled]="form.invalid" (onClick)="submit()" />
  </ng-template>
</p-dialog>
