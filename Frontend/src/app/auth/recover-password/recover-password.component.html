<div class="flex align-items-center justify-content-center min-h-screen surface-ground">
  <div class="w-full" style="max-width: 420px">
    <p-card>
      <ng-template pTemplate="header">
        <div class="text-center pt-4 pb-2">
          <h2 class="text-2xl font-bold text-primary m-0">Recuperar contraseña</h2>
        </div>
      </ng-template>

      @if (!sent()) {
        <form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-column gap-3">
          <div class="flex flex-column gap-1">
            <label for="email" class="font-medium">Correo electrónico</label>
            <input pInputText id="email" type="email" formControlName="email" placeholder="correo@ejemplo.com" class="w-full" />
          </div>
          <p-button type="submit" label="Enviar instrucciones" [loading]="loading()" [disabled]="form.invalid" styleClass="w-full" />
          <div class="text-center">
            <a routerLink="/auth/login" class="text-primary cursor-pointer text-sm">Volver al inicio de sesión</a>
          </div>
        </form>
      } @else {
        <div class="text-center flex flex-column gap-3">
          <i class="pi pi-check-circle text-green-500" style="font-size: 3rem"></i>
          <p>Si el correo está registrado recibirás las instrucciones para recuperar tu contraseña.</p>
          <a routerLink="/auth/login" class="text-primary cursor-pointer">Volver al inicio de sesión</a>
        </div>
      }
    </p-card>
  </div>
</div>
